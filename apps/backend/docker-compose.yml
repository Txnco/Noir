# ============================================
# JetApi Docker Compose
# Dev: API + Redis + Nginx
# Prod: swap Redis for external managed instance
# ============================================

services:
  # ----------------------------------------
  # API Application
  # ----------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jetapi-api
    restart: unless-stopped
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - app-logs:/app/logs
    networks:
      - jetapi-network

  # ----------------------------------------
  # Redis (Dev only — use external Redis in prod)
  # ----------------------------------------
  redis:
    image: redis:7-alpine
    container_name: jetapi-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - jetapi-network

  # ----------------------------------------
  # Nginx Reverse Proxy
  # ----------------------------------------
  nginx:
    image: nginx:alpine
    container_name: jetapi-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - jetapi-network

volumes:
  redis-data:
    driver: local
  app-logs:
    driver: local

networks:
  jetapi-network:
    driver: bridge
