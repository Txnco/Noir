# =============================================================================
# Alembic Configuration for JetApi
# =============================================================================
# A generic, single database configuration.

[alembic]
# Path to migration scripts
script_location = alembic

# Template used to generate migration file names
# Uncomment to customize: file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# sys.path path, prepended to sys.path if present
prepend_sys_path = .

# Timezone for migration file timestamps (requires Python 3.9+ or backports.zoneinfo)
# timezone =

# Max length of characters for the "slug" field
# truncate_slug_length = 40

# Set to 'true' to run environment during 'revision' command
# revision_environment = false

# Set to 'true' to allow .pyc/.pyo files without source .py
# sourceless = false

# Version location specification (defaults to alembic/versions)
# version_locations = %(here)s/bar:%(here)s/bat:alembic/versions

# Version path separator
version_path_separator = os

# Set to 'true' for recursive version location search
# recursive_version_locations = false

# Output encoding for revision files
# output_encoding = utf-8

# Database URL - This is overridden by env.py using settings.DATABASE_URL
# Keep this as a placeholder
sqlalchemy.url = sqlite:///./jetapi.db


[post_write_hooks]
# Post-write hooks for newly generated revision scripts
# Uncomment to format with black:
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 88 REVISION_SCRIPT_FILENAME


# =============================================================================
# Logging Configuration
# =============================================================================
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
